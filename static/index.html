<html>
<head>
    <title>Go Telemetry and Echo service</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <center>
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">
            Telemetry and Echo v1.0
        </h2>
        <div class="container">
            <div>
                <b class="textStyle">
                    CPU Freq:<br>
                </b>
                <output id="cpu_freq", class="textStyle">
                    0
                </output>
            </div>
            <div>
                <b class="textStyle">
                    RAM:<br>
                </b>
                <output id="ram", class="textStyle">
                    0
                </output>
            </div>
        </div>
        <div class="echoBlock">
            <label for="inptTextEcho" class="textStyle">Сообщение для echo:</label>
            <input type="text" id="inptTextEcho" placeholder="Введите текст..."><br>
            <button type="button" onclick="sendEcho()" style="margin-top: 10px; margin-bottom: 10px;">Send Message</button>
            <label for="outputTextEcho" class="textStyle"><br>Ответ echo:</label>
            <output id="outputTextEcho" class="textStyle"><br>Will Be Echo Message</output>
        </div>
    </center>
</body>
</html>

<script src="index.js"></script>
